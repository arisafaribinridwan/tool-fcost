name: "FCOST Autofill RAW"
version: 1
status: "autofill_raw_pipeline"

ui:
  target_folder_prompt:
    enabled: true

target_update:
  enabled: true
  match_column: "model_series"
  sheet_name: "raw"
  source_filter:
    column: "job_sheet_section"
    equals: 1
  duplicate_key_columns:
    - "notification"
    - "model_series"
    - "part_used"

datasets:
  working_dataset: "result"
  canonical_columns:
    - "notification"
    - "job_sheet_section"
    - "malfunction_start_date"
    - "basic_finish_date"
    - "model_name"
    - "category"
    - "serial_number"
    - "symptom_code"
    - "symptom_code_description"
    - "pmacttype"
    - "pmacttype_description"
    - "symptom_comment"
    - "repair_comment"
    - "description"
    - "warranty"
    - "planner_group"
    - "branch"
    - "purchased_date"
    - "labor_cost"
    - "transportation_cost"
    - "parts_cost"
    - "part_used"
    - "section"
    - "prod_lot"
    - "prod_date"
    - "inch"
    - "total_cost"
    - "diff_month"
    - "part_name"
    - "panel_usage"
    - "factory"
    - "model_series"
    - "symptom"
    - "action"
    - "defect_category"
    - "defect"
    - "keydate"

steps:
  - id: "extract_result_source"
    type: "extract_sheet"
    sheet_selector:
      contains: "result"
      case_sensitive: false
    header_locator:
      type: "required_columns"
      scan_rows: [1, 25]
      case_sensitive: false
      normalize: true
      required:
        - "model_series"
        - "job_sheet_section"
    select:
      "notification": "notification"
      "job_sheet_section": "job_sheet_section"
      "malfunction_start_date": "malfunction_start_date"
      "basic_finish_date": "basic_finish_date"
      "model_name": "model_name"
      "category": "category"
      "serial_number": "serial_number"
      "symptom_code": "symptom_code"
      "symptom_code_description": "symptom_code_description"
      "pmacttype": "pmacttype"
      "pmacttype_description": "pmacttype_description"
      "symptom_comment": "symptom_comment"
      "repair_comment": "repair_comment"
      "description": "description"
      "warranty": "warranty"
      "planner_group": "planner_group"
      "branch": "branch"
      "purchased_date": "purchased_date"
      "labor_cost": "labor_cost"
      "transportation_cost": "transportation_cost"
      "parts_cost": "parts_cost"
      "part_used": "part_used"
      "section": "section"
      "prod_lot": "prod_lot"
      "prod_date": "prod_date"
      "inch": "inch"
      "total_cost": "total_cost"
      "diff_month": "diff_month"
      "part_name": "part_name"
      "panel_usage": "panel_usage"
      "factory": "factory"
      "model_series": "model_series"
      "symptom": "symptom"
      "action": "action"
      "defect_category": "defect_category"
      "defect": "defect"
      "keydate": "keydate"
    write_to: "result"
    mode: "replace"

outputs:
  - sheet_name: "autofill_preview"
    columns:
      - "model_series"
      - "job_sheet_section"

styling:
  date_format: "YYYY-MM-DD"
