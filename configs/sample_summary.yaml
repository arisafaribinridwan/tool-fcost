name: "Laporan Summary"
source_sheet: "Data"

header:
  title: "Laporan Summary"
  period_from_column: "date"

masters: []

outputs:
  - sheet_name: "Summary"
    pivot:
      index: "kategori"
      values: "qty"
      aggfunc: "sum"

styling:
  header_color: "1F4E78"
  font: "Calibri"
  number_format: "#,##0"
  date_format: "DD/MM/YYYY"
  freeze_pane: "A2"
