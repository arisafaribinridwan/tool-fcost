name: "Job Summary Result"
version: 1
status: "summary_result_pipeline"

datasets:
  working_dataset: "result"
  canonical_columns:
    - "notification"
    - "job_sheet_section"
    - "malfunction_start_date"
    - "basic_finish_date"
    - "model_name"
    - "category"
    - "serial_number"
    - "symptom_code"
    - "symptom_code_description"
    - "pmacttype"
    - "pmacttype_description"
    - "symptom_comment"
    - "repair_comment"
    - "description"
    - "warranty"
    - "planner_group"
    - "branch"
    - "purchased_date"
    - "labor_cost"
    - "transportation_cost"
    - "parts_cost"
    - "part_used"
    - "section"
    - "prod_month"
    - "inch"
    - "total_cost"
    - "diff_month"
    - "part_name"
    - "panel_usage"
    - "factory"
    - "symptom"
    - "action"
    - "defect_category"
    - "defect"
    - "keydate"

steps:
  - id: "extract_result_like_source"
    type: "extract_sheet"
    sheet_selector:
      mode: "single_sheet_workbook"
    header_locator:
      type: "required_columns"
      scan_rows: [1, 25]
      case_sensitive: false
      normalize: true
      required:
        - "notification"
        - "model_name"
        - "section"
        - "inch"
        - "total_cost"
        - "part_name"
        - "panel_usage"
        - "symptom"
        - "branch"
    select:
      "notification": "notification"
      "job_sheet_section": "job_sheet_section"
      "malfunction_start_date": "malfunction_start_date"
      "basic_finish_date": "basic_finish_date"
      "model_name": "model_name"
      "category": "category"
      "serial_number": "serial_number"
      "symptom_code": "symptom_code"
      "symptom_code_description": "symptom_code_description"
      "pmacttype": "pmacttype"
      "pmacttype_description": "pmacttype_description"
      "symptom_comment": "symptom_comment"
      "repair_comment": "repair_comment"
      "description": "description"
      "warranty": "warranty"
      "planner_group": "planner_group"
      "branch": "branch"
      "purchased_date": "purchased_date"
      "labor_cost": "labor_cost"
      "transportation_cost": "transportation_cost"
      "parts_cost": "parts_cost"
      "part_used": "part_used"
      "section": "section"
      "prod_month": "prod_month"
      "inch": "inch"
      "total_cost": "total_cost"
      "diff_month": "diff_month"
      "part_name": "part_name"
      "panel_usage": "panel_usage"
      "factory": "factory"
      "symptom": "symptom"
      "action": "action"
      "defect_category": "defect_category"
      "defect": "defect"
      "keydate": "keydate"
    write_to: "result"

outputs:
  - sheet_name: "result"
    columns:
      - "notification"
      - "job_sheet_section"
      - "malfunction_start_date"
      - "basic_finish_date"
      - "model_name"
      - "category"
      - "serial_number"
      - "symptom_code"
      - "symptom_code_description"
      - "pmacttype"
      - "pmacttype_description"
      - "symptom_comment"
      - "repair_comment"
      - "description"
      - "warranty"
      - "planner_group"
      - "branch"
      - "purchased_date"
      - "labor_cost"
      - "transportation_cost"
      - "parts_cost"
      - "part_used"
      - "section"
      - "prod_month"
      - "inch"
      - "total_cost"
      - "diff_month"
      - "part_name"
      - "panel_usage"
      - "factory"
      - "symptom"
      - "action"
      - "defect_category"
      - "defect"
      - "keydate"

  - sheet_name: "data1"
    summary:
      type: "static_part_pivot_summary"
      layout_mode: "plain"
      title: "PART COST (3 Worst)"
      subtitle: "Part Category: PANEL | MAIN_UNIT | POWER_UNIT | OTHER (all non-blank parts excluding the 3 main)"
      column_width: 13.0
      options:
        formula_source_sheet: "result"
        formula_section_ref: "$W:$W"
        formula_part_ref: "$AB:$AB"
        formula_labor_ref: "$S:$S"
        formula_transportation_ref: "$T:$T"
        formula_parts_ref: "$U:$U"
        formula_total_ref: "$Z:$Z"
        column_labels:
          section: "Section"
          part_name: "Part Name"
          "Sum of labor_cost": "Labor"
          "Sum of transportation_cost": "Transportation"
          "Sum of parts_cost": "Parts"
          "Sum of total_cost": "Total"
          "Count of part_name": "Count"

  - sheet_name: "data2"
    summary:
      type: "part_pivot_summary"
      layout_mode: "plain"
      title: "PART COST SUMMARY"
      subtitle: "Part cost summary by section and part name"
      column_width: 13.0
      options:
        column_labels:
          section: "Section"
          part_name: "Part Name"
          "Sum of labor_cost": "Labor"
          "Sum of transportation_cost": "Transportation"
          "Sum of parts_cost": "Parts"
          "Sum of total_cost": "Total"
          "Count of part_name": "Count"

  - sheet_name: "data3a"
    summary:
      type: "panel_model_summary"
      layout_mode: "plain"
      title: "PANEL MODEL SUMMARY"
      subtitle: "Panel summary by inch and model"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          inch: "Inch"
          model_name: "Model Name"
          Total: "Total"

  - sheet_name: "data3b"
    summary:
      type: "panel_symptom_summary"
      layout_mode: "plain"
      title: "PANEL SYMPTOM SUMMARY"
      subtitle: "Panel summary by symptom"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          symptom: "Symptom"
          Total: "Total"

  - sheet_name: "data3c"
    summary:
      type: "panel_area_summary"
      layout_mode: "plain"
      title: "PANEL AREA SUMMARY"
      subtitle: "Panel summary by branch area"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          branch: "Branch"
          Total: "Total"

  - sheet_name: "data4"
    summary:
      type: "panel_usage_summary"
      layout_mode: "plain"
      title: "PANEL USAGE SUMMARY"
      subtitle: "Panel summary by usage"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          panel_usage: "Panel Usage"
          Total: "Total"

  - sheet_name: "data5a"
    summary:
      type: "panel_fcost_inch_summary"
      layout_mode: "plain"
      title: "PANEL FCOST BY INCH"
      subtitle: "Panel FCOST summary by inch"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          inch: "Inch"
          "Sum of labor_cost": "Labor"
          "Sum of transportation_cost": "Transportation"
          "Sum of parts_cost": "Parts"
          "Sum of total_cost": "Total"
          "Count of part_name": "Count"

  - sheet_name: "data5b"
    summary:
      type: "panel_top1_inch_model_summary"
      layout_mode: "plain"
      title: "PANEL TOP MODEL BY INCH"
      subtitle: "Top panel model summary by inch"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          inch: "Inch"
          model_name: "Model Name"
          "Sum of labor_cost": "Labor"
          "Sum of transportation_cost": "Transportation"
          "Sum of parts_cost": "Parts"
          "Sum of total_cost": "Total"
          "Count of part_name": "Count"

  - sheet_name: "data6"
    summary:
      type: "panel_symptom_inch_matrix"
      layout_mode: "plain"
      title: "PANEL SYMPTOM INCH MATRIX"
      subtitle: "Panel symptom matrix by inch"
      column_width: 13.0
      options:
        column_labels:
          part_name: "Part Name"
          symptom: "Symptom"
          Grand Total: "Grand Total"

styling:
  font: "Calibri"
  header_color: "4472C4"
  zebra_stripe: true
  zebra_color: "F2F2F2"
  subtotal_color: "FFF2CC"
  grand_total_color: "1F3864"
