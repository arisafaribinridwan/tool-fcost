name: CI

"on":
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

  linux-package:
    name: Linux Package
    runs-on: ubuntu-24.04
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3.12-venv xvfb

      - name: Bootstrap Linux build environment
        run: ./packaging/linux/bootstrap-build-env.sh

      - name: Build Linux bundle
        run: ./packaging/linux/build.sh

      - name: Smoke test packaged GUI
        run: ./packaging/linux/smoke-test.sh

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ExcelAutoTool-linux-x86_64
          path: |
            dist/ExcelAutoTool-linux-x86_64.tar.gz
            dist/ExcelAutoTool/
          if-no-files-found: error
          retention-days: 14
